name: 🚀 Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to /var/www/ec-gym-system
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del código ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Limpiar archivos innecesarios antes de rsync ──────────────
      - name: 🧹 Clean up dev files
        run: |
          rm -rf .git .github .gitignore compose.yaml DOCKER.md
          rm -rf .env.example generar_manual.php seeder.php
          find . -name "*.bak" -delete 2>/dev/null || true
          find . -name "*.sql" -path "*/bk_*" -delete 2>/dev/null || true

      # ── 3. Sincronizar código al VPS ─────────────────────────────────
      - name: 🚀 Rsync code to VPS
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete
            --exclude='.env'
            --exclude='vendor/'
            --exclude='public/img/socios/'
            --exclude='public/img/productos/'
            --exclude='public/sri/xml/'
            --exclude='public/sri/certificados/'
            --exclude='public/sri/pdf/'
            --exclude='public/cert/'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      # ── 4. Generar .env y levantar contenedores ──────────────────────
      - name: ⚙️ Docker Compose up
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔧 Generando .env desde secrets..."
            cat > .env << 'ENVEOF'
            APP_PORT=${{ secrets.APP_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            ENVEOF
            chmod 600 .env

            # Exportar variables para usarlas en el script
            export $(grep -v '^#' .env | xargs)

            echo "🐳 Construyendo y levantando contenedores..."
            docker compose -f compose.prod.yaml -p ec-gym-system up -d --build

            echo "⏳ Esperando que MySQL esté healthy..."
            until docker exec ec-gym-system-db mysqladmin ping -h localhost --silent 2>/dev/null; do
              sleep 2
            done

            echo "🗄️ Verificando tablas en la base de datos..."
            TABLE_COUNT=$(docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -sN -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${DB_DATABASE}'" 2>/dev/null || echo "0")
            if [ "$TABLE_COUNT" = "0" ]; then
              echo "📥 Importando schema.sql (${DB_DATABASE})..."
              docker exec -i ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" < schema.sql
              echo "✅ Schema importado correctamente."
              echo "🔄 Reiniciando app para que detecte las tablas..."
              docker restart ec-gym-system-app
            else
              echo "✅ La base ya tiene $TABLE_COUNT tablas, no se reimporta."
            fi

            echo "🩹 Ejecutando migraciones pendientes (columnas/tablas nuevas)..."
            docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -e "
              -- socios: facturacion electronica
              ALTER TABLE socios ADD COLUMN IF NOT EXISTS tipo_doc VARCHAR(1) DEFAULT '1' COMMENT '1=DNI,6=RUC,4=CE,7=PAS';
              ALTER TABLE socios ADD COLUMN IF NOT EXISTS direccion_fiscal VARCHAR(255) DEFAULT NULL;

              -- suscripciones: comprobantes SRI
              ALTER TABLE suscripciones ADD COLUMN IF NOT EXISTS comprobante_id INT DEFAULT NULL;
              ALTER TABLE suscripciones ADD COLUMN IF NOT EXISTS tipo_comprobante VARCHAR(20) DEFAULT 'boleta';

              -- ventas: datos de cliente y comprobante
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS descuento DECIMAL(10,2) DEFAULT 0.00;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS tipo_comprobante VARCHAR(20) DEFAULT NULL;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS cliente_tipo_doc VARCHAR(2) DEFAULT NULL;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS cliente_num_doc VARCHAR(20) DEFAULT NULL;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS cliente_razon VARCHAR(255) DEFAULT NULL;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS cliente_direccion VARCHAR(255) DEFAULT NULL;
              ALTER TABLE ventas ADD COLUMN IF NOT EXISTS comprobante_id INT DEFAULT NULL;

              -- gastos: estado y motivo de anulacion
              ALTER TABLE gastos ADD COLUMN IF NOT EXISTS estado ENUM('creado','anulado') DEFAULT 'creado';
              ALTER TABLE gastos ADD COLUMN IF NOT EXISTS motivo_anulacion VARCHAR(255) DEFAULT NULL;

              -- configuracion: datos SRI Ecuador
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS razon_social VARCHAR(255) DEFAULT NULL;
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS nombre_comercial VARCHAR(255) DEFAULT NULL;
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS sri_ambiente ENUM('1','2') DEFAULT '1';
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS sri_establecimiento VARCHAR(3) DEFAULT '001';
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS sri_punto_emision VARCHAR(3) DEFAULT '001';
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS sri_certificado_p12 VARCHAR(255) DEFAULT NULL;
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS sri_certificado_clave VARCHAR(255) DEFAULT NULL;
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS iva_tasa DECIMAL(5,2) DEFAULT 15.00;
              ALTER TABLE configuracion ADD COLUMN IF NOT EXISTS incluye_iva TINYINT(1) DEFAULT 1;
            " 2>/dev/null || true

            echo "🩹 Creando tablas SRI si no existen..."
            docker exec -i ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" < app/config/migration_sri.sql 2>/dev/null || true

            echo "✅ Migraciones aplicadas."

            echo "📁 Asegurando permisos en volúmenes..."
            docker exec ec-gym-system-app chown -R www-data:www-data /var/www/html/public/img /var/www/html/public/sri 2>/dev/null || true

            echo ""
            echo "✅ Despliegue completado — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📍 App accesible en 127.0.0.1:8082 (proxy inverso desde Nginx)"
            docker compose -f compose.prod.yaml -p ec-gym-system ps
