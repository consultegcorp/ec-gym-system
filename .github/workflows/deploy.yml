name: 🚀 Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to /var/www/ec-gym-system
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del código ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Limpiar archivos innecesarios antes de rsync ──────────────
      - name: 🧹 Clean up dev files
        run: |
          rm -rf .git .github .gitignore compose.yaml DOCKER.md
          rm -rf .env.example generar_manual.php seeder.php
          find . -name "*.bak" -delete 2>/dev/null || true
          find . -name "*.sql" -path "*/bk_*" -delete 2>/dev/null || true

      # ── 3. Sincronizar código al VPS ─────────────────────────────────
      - name: 🚀 Rsync code to VPS
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete
            --exclude='.env'
            --exclude='vendor/'
            --exclude='public/img/socios/'
            --exclude='public/img/productos/'
            --exclude='public/sri/xml/'
            --exclude='public/sri/certificados/'
            --exclude='public/sri/pdf/'
            --exclude='public/cert/'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      # ── 4. Generar .env y levantar contenedores ──────────────────────
      - name: ⚙️ Docker Compose up
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔧 Generando .env desde secrets..."
            cat > .env << 'ENVEOF'
            APP_PORT=${{ secrets.APP_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            ENVEOF
            chmod 600 .env

            # Exportar variables para usarlas en el script
            export $(grep -v '^#' .env | xargs)

            echo "🐳 Construyendo y levantando contenedores..."
            docker compose -f compose.prod.yaml -p ec-gym-system up -d --build

            echo "⏳ Esperando que MySQL esté healthy..."
            until docker exec ec-gym-system-db mysqladmin ping -h localhost --silent 2>/dev/null; do
              sleep 2
            done

            echo "🗄️ Verificando tablas en la base de datos..."
            TABLE_COUNT=$(docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -sN -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${DB_DATABASE}'" 2>/dev/null || echo "0")
            if [ "$TABLE_COUNT" = "0" ]; then
              echo "📥 Importando schema.sql (${DB_DATABASE})..."
              docker exec -i ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" < schema.sql
              echo "✅ Schema importado correctamente."
              echo "🔄 Reiniciando app para que detecte las tablas..."
              docker restart ec-gym-system-app
            else
              echo "✅ La base ya tiene $TABLE_COUNT tablas, no se reimporta."
            fi

            echo "🩹 Ejecutando migraciones pendientes..."
            for stmt in \
              "ALTER TABLE socios ADD COLUMN tipo_doc VARCHAR(1) DEFAULT '1'" \
              "ALTER TABLE socios ADD COLUMN direccion_fiscal VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE suscripciones ADD COLUMN comprobante_id INT DEFAULT NULL" \
              "ALTER TABLE suscripciones ADD COLUMN tipo_comprobante VARCHAR(20) DEFAULT 'boleta'" \
              "ALTER TABLE ventas ADD COLUMN descuento DECIMAL(10,2) DEFAULT 0.00" \
              "ALTER TABLE ventas ADD COLUMN tipo_comprobante VARCHAR(20) DEFAULT NULL" \
              "ALTER TABLE ventas ADD COLUMN cliente_tipo_doc VARCHAR(2) DEFAULT NULL" \
              "ALTER TABLE ventas ADD COLUMN cliente_num_doc VARCHAR(20) DEFAULT NULL" \
              "ALTER TABLE ventas ADD COLUMN cliente_razon VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE ventas ADD COLUMN cliente_direccion VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE ventas ADD COLUMN comprobante_id INT DEFAULT NULL" \
              "ALTER TABLE gastos ADD COLUMN estado ENUM('creado','anulado') DEFAULT 'creado'" \
              "ALTER TABLE gastos ADD COLUMN motivo_anulacion VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE configuracion ADD COLUMN razon_social VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE configuracion ADD COLUMN nombre_comercial VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE configuracion ADD COLUMN sri_ambiente ENUM('1','2') DEFAULT '1'" \
              "ALTER TABLE configuracion ADD COLUMN sri_establecimiento VARCHAR(3) DEFAULT '001'" \
              "ALTER TABLE configuracion ADD COLUMN sri_punto_emision VARCHAR(3) DEFAULT '001'" \
              "ALTER TABLE configuracion ADD COLUMN sri_certificado_p12 VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE configuracion ADD COLUMN sri_certificado_clave VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE configuracion ADD COLUMN iva_tasa DECIMAL(5,2) DEFAULT 15.00" \
              "ALTER TABLE configuracion ADD COLUMN incluye_iva TINYINT(1) DEFAULT 1" \
            ; do
              docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -e "$stmt" 2>&1 || true
            done

            echo "🩹 Creando tablas SRI..."
            docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -e "
              CREATE TABLE IF NOT EXISTS sri_series (
                id INT NOT NULL AUTO_INCREMENT,
                tipo_doc VARCHAR(2) NOT NULL,
                serie VARCHAR(6) NOT NULL,
                correlativo INT NOT NULL DEFAULT 0,
                descripcion VARCHAR(120) DEFAULT NULL,
                estado ENUM('activo','inactivo') DEFAULT 'activo',
                PRIMARY KEY (id),
                UNIQUE KEY unq_tipo_serie (tipo_doc, serie)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
            " || true

            docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -e "
              INSERT IGNORE INTO sri_series (tipo_doc, serie, correlativo, descripcion) VALUES
                ('01','001001',0,'Facturas electrónicas'),
                ('04','001001',0,'Notas de crédito electrónicas');
            " || true

            docker exec ec-gym-system-db mysql -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}" -e "
              CREATE TABLE IF NOT EXISTS sri_log (
                id INT NOT NULL AUTO_INCREMENT,
                comprobante_id INT DEFAULT NULL,
                accion VARCHAR(40) NOT NULL,
                request_xml MEDIUMTEXT DEFAULT NULL,
                response_xml MEDIUMTEXT DEFAULT NULL,
                codigo VARCHAR(10) DEFAULT NULL,
                mensaje TEXT DEFAULT NULL,
                creado_en DATETIME DEFAULT CURRENT_TIMESTAMP,
                PRIMARY KEY (id),
                KEY idx_comp_log (comprobante_id),
                KEY idx_accion (accion)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
            " || true

            echo "✅ Migraciones aplicadas."

            echo "📁 Asegurando permisos en volúmenes..."
            docker exec ec-gym-system-app chown -R www-data:www-data /var/www/html/public/img /var/www/html/public/sri 2>/dev/null || true

            echo ""
            echo "✅ Despliegue completado — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📍 App accesible en 127.0.0.1:8082 (proxy inverso desde Nginx)"
            docker compose -f compose.prod.yaml -p ec-gym-system ps
