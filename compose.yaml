services:
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-8088}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ec_gym_system}
      DB_USERNAME: ${DB_USERNAME:-gym_user}
      DB_PASSWORD: ${DB_PASSWORD:-gym_password}
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ec_gym_system}
      MYSQL_USER: ${DB_USERNAME:-gym_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gym_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      TZ: America/Guayaquil
    volumes:
      - gym_mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  gym_mysql_data:
